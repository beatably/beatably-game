<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/img/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/img/icon-192.png" />
    <title>Beatably</title>
    <!-- The game app page shouldn't compete with the beatably.app landing page in search -->
    <meta name="robots" content="noindex">

    <!-- Open Graph / Twitter (so shared game/join links unfurl nicely) -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Beatably">
    <meta property="og:title" content="Beatably — The Music Timeline Party Game">
    <meta property="og:description" content="Hear a song, guess when it dropped, and build your timeline. Challenge your friends and steal their cards. First to fill their timeline wins.">
    <meta property="og:url" content="https://play.beatably.app/">
    <meta property="og:image" content="https://beatably.app/img/landing/og-image.png">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Beatably — The Music Timeline Party Game">
    <meta name="twitter:description" content="Hear a song, guess when it dropped, and build your timeline. First to fill their timeline wins.">
    <meta name="twitter:image" content="https://beatably.app/img/landing/og-image.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover, interactive-widget=resizes-visual">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-touch-fullscreen" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Beatably">
    
    <!-- Apple Touch Icons (multiple sizes) -->
    <link rel="apple-touch-icon" href="/img/icon-180.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/img/icon-180.png">
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Theme color for mobile browsers -->
    <meta name="theme-color" content="#0C0A1A">
    <meta name="msapplication-TileColor" content="#0C0A1A">
    <meta name="color-scheme" content="dark">
    <!-- Immediate inline background to avoid white flash before external CSS loads -->
    <style>html,body,#root{background-color:#0C0A1A!important;margin:0;height:100%;min-height:100%}</style>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400..900&display=swap" rel="stylesheet">
    <script>
      (function () {
        try {
          // In Vite dev, SPA will serve index.html for /admin.
          // Redirect early to the static admin panel.
          var p = (window.location.pathname || '').replace(/\/+$/, '');
          if (p === '/admin') {
            window.location.replace('/admin.html');
          }
        } catch (e) {
          // no-op
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
