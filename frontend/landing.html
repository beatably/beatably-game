<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="icon" type="image/png" href="/img/icon-192.png">
    <link rel="apple-touch-icon" href="/img/icon-192.png">
    <meta name="theme-color" content="#0C0A1A">
    <meta name="color-scheme" content="dark">

    <!-- Open Graph / Twitter -->
    <meta property="og:type" content="website">
    <meta property="og:site_name" content="Beatably">
    <meta property="og:title" content="Beatably — The Music Timeline Party Game">
    <meta property="og:description" content="Hear a song, guess when it dropped, and build your timeline. Challenge your friends and steal their cards. First to fill their timeline wins.">
    <meta property="og:url" content="https://beatably.app/">

    <meta property="og:image:height" content="630">

    <!-- Immediate inline background to avoid white flash before external CSS loads -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400..900&display=swap" rel="stylesheet">

    <!-- Hero demo album art (40px nodes; tiny files, avoid pop-in on first loop) -->
    <link rel="preload" as="image" href="/img/landing/art/take-on-me.jpg">
    <link rel="preload" as="image" href="/img/landing/art/wonderwall.jpg">
    <link rel="preload" as="image" href="/img/landing/art/hey-ya.jpg">
    <link rel="preload" as="image" href="/img/landing/art/rolling-in-the-deep.jpg">

    <!-- Structured data: helps search engines and LLMs understand what Beatably
         is, that it's a free game, and where to get it (web + App Store). -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "SoftwareApplication",
          "name": "Beatably",
          "description": "Beatably is the free multiplayer music timeline party game. Hear a song, guess when it dropped, place it in order on your timeline, and steal the cards your friends get wrong. First to fill their timeline wins.",
          "applicationCategory": "GameApplication",
          "operatingSystem": "iOS, Web",
          "url": "https://beatably.app/",
          "installUrl": "https://apps.apple.com/app/beatably/id6788660791",
          "image": "https://beatably.app/img/landing/og-image.png",
          "inLanguage": "en",
          "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "USD"
          },
          "publisher": { "@id": "https://beatably.app/#org" }
        },
        {
          "@type": "WebSite",
          "name": "Beatably",
          "url": "https://beatably.app/",
          "inLanguage": "en",
          "publisher": { "@id": "https://beatably.app/#org" }
        },
        {
          "@type": "Organization",
          "@id": "https://beatably.app/#org",
          "name": "Beatably",
          "url": "https://beatably.app/",
          "logo": "https://beatably.app/img/icon-192.png"
        }
      ]
    }

        <p>Hear a song, guess when it dropped, and build your timeline. Challenge your friends' picks and steal their cards. First to fill their timeline wins.</p>
        <p><a href="https://play.beatably.app" style="color: #08AF9A;">Play in your browser</a></p>
      </div>
    </noscript>
    <script type="module" src="/src/landing/main.jsx"></script>
