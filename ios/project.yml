name: Beatably
options:
  bundleIdPrefix: app.beatably

packages:
  SocketIO:
    url: https://github.com/socketio/socket.io-client-swift
    from: "16.1.1"

targets:
  Beatably:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Beatably
    info:
      path: Beatably/Info.plist
      properties:
        ITSAppUsesNonExemptEncryption: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIBackgroundModes:
          - audio
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UIColorName: LaunchBackground
          UIImageName: LaunchLogo
          UIImageRespectsSafeAreaInsets: true
        CFBundleURLTypes:
          - CFBundleURLName: app.beatably.ios
            CFBundleURLSchemes:
              - beatably
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.beatably.ios
        SWIFT_VERSION: 5.9
        # MARKETING_VERSION (CFBundleShortVersionString) is the user-facing version —
        # bump it manually for each public release (1.0 -> 1.1 -> 2.0).
        MARKETING_VERSION: "1.1"
        # CURRENT_PROJECT_VERSION is a fallback; the real build number
        # (CFBundleVersion) is stamped from the git commit count at build time
        # by the "Set build number from git" phase below.
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1"
    postCompileScripts:
      - name: "Set build number from git"
        basedOnDependencyAnalysis: false
        script: |
          # Auto-stamp CFBundleVersion with the git commit count so every upload
          # gets a unique, strictly-increasing build number with no manual bumping.
          build_number=$(git -C "$SRCROOT" rev-list --count HEAD 2>/dev/null || echo 0)
          plist="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          if [ "$build_number" -gt 0 ] && [ -f "$plist" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $build_number" "$plist"
            echo "Set CFBundleVersion to $build_number"
          fi
    dependencies:
      - package: SocketIO
        product: SocketIO

  BeatableTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BeatableTests
    dependencies:
      - target: Beatably
    settings:
      base:
        SWIFT_VERSION: 5.9
        GENERATE_INFOPLIST_FILE: YES

  BeatableUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BeatableUITests
    dependencies:
      - target: Beatably
    settings:
      base:
        SWIFT_VERSION: 5.9
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Beatably

schemes:
  Beatably:
    build:
      targets:
        Beatably: all
    test:
      targets:
        - name: BeatableTests

  BeatablyUI:
    build:
      targets:
        Beatably: all
        BeatableUITests: [test]
    test:
      targets:
        - name: BeatableUITests
