name: Beatably
options:
  bundleIdPrefix: app.beatably

packages:
  SocketIO:
    url: https://github.com/socketio/socket.io-client-swift
    from: "16.1.1"

targets:
  Beatably:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Beatably
    info:
      path: Beatably/Info.plist
      properties:
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - audio
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UILaunchScreen:
          UIColorName: LaunchBackground
        CFBundleURLTypes:
          - CFBundleURLName: app.beatably.ios
            CFBundleURLSchemes:
              - beatably
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.beatably.ios
        SWIFT_VERSION: 5.9
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
    dependencies:
      - package: SocketIO
        product: SocketIO

  BeatableTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BeatableTests
    dependencies:
      - target: Beatably
    settings:
      base:
        SWIFT_VERSION: 5.9
        GENERATE_INFOPLIST_FILE: YES

  BeatableUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: BeatableUITests
    dependencies:
      - target: Beatably
    settings:
      base:
        SWIFT_VERSION: 5.9
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: Beatably

schemes:
  Beatably:
    build:
      targets:
        Beatably: all
    test:
      targets:
        - name: BeatableTests

  BeatablyUI:
    build:
      targets:
        Beatably: all
        BeatableUITests: [test]
    test:
      targets:
        - name: BeatableUITests
