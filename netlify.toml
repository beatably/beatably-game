[build]
  # Build command for the frontend
  command = "cd frontend && rm -rf node_modules package-lock.json && npm install && npm run build"
  # Directory to publish
  publish = "frontend/dist"

[build.environment]
  # Node version
  NODE_VERSION = "18"

# ── Host routing ──────────────────────────────────────────────────────
# beatably.app (and www) serve the marketing landing page (landing.html);
# the game SPA lives at play.beatably.app — add play.beatably.app as a
# domain alias on this Netlify site and point its DNS at Netlify.
# Rules are evaluated top-down; rules without force=true never shadow
# real files, so /img/*, /assets/*, /privacy.html etc. keep working on
# every host.

# Canonicalize www → apex for the marketing site
[[redirects]]
  from = "https://www.beatably.app/*"
  to = "https://beatably.app/:splat"
  status = 301
  force = true

# Marketing landing page at the apex root
[[redirects]]
  from = "https://beatably.app/"
  to = "/landing.html"
  status = 200
  force = true

# Any non-file path on the marketing host goes home (keeps the game's SPA
# fallback below from serving the game at beatably.app/<anything>)
[[redirects]]
  from = "https://beatably.app/*"
  to = "https://beatably.app/"
  status = 301

# Serve admin panel static page (play.beatably.app/admin)
[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200

# SPA fallback for the game (play.beatably.app and the netlify subdomain)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for security and performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Enable gzip compression
[build.processing]
  skip_processing = false

[build.processing.css]
  bundle = true
  minify = true

[build.processing.js]
  bundle = true
  minify = true

[build.processing.html]
  pretty_urls = true
